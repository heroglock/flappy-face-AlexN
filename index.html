<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flappy NAVALNY с НАВАЛЬНЫМ РАЗБЕЙ ЕГО ОБ СТЕНУ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="разбей Навального в новой супер игре Flappy NAVALNY">
  <meta name="keywords" content="flappy bird, heroglock, game, navalny, flappy navalny, flappy navalny game">
  <meta name="author" content="heroglock">
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <meta name="google" content="notranslate">
</head>

<body>
  <div id="wrap">
    <canvas id="game" aria-label="Игровое поле Flappy Bird"></canvas>

    <!-- Menu Screen -->
    <div id="menuScreen" class="screen on">
      <div class="panel">
        <div class="titleRow">
          <div>
            <div class="title">Flappy NAVALNY</div>
            <div class="sub">Нажми <b>Space</b> или тапни/кликни, чтобы взлететь. Избегай труб.</div>
          </div>
          <div style="text-align:right">
            <div class="bigNum" id="bestTop">0</div>
            <div class="sub" style="margin-top:0">Лучший счет</div>
          </div>
        </div>

        <button id="startBtn" type="button">Начать игру</button>

        <div class="togRow">
          <div class="toggleWrap">
            <div class="tLabel">Лицо</div>
          </div>
          <label class="faceSelectWrap" for="faceSelect">
            <span class="srOnly">Выбрать лицо персонажа</span>
            <select id="faceSelect" aria-label="Выбор лица">
              <option value="navalny">Навальный</option>
              <option value="lord">Лорд, бог, творец</option>
              <option value="rem">Рем Re:ZERO</option>
            </select>
          </label>
        </div>

        <div class="togRow">
          <div class="toggleWrap">
            <div class="tLabel">Звук</div>
          </div>
          <div id="soundSwitch" class="switch on" role="switch" aria-checked="true" tabindex="0">
            <span class="srOnly">Переключить звук</span>
            <div class="knob"></div>
          </div>
        </div>

        <div class="hintRow">
          Подсказка: тайминг решает — короткие нажатия работают лучше.
        </div>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="overScreen" class="screen">
      <div class="panel">
        <div class="titleRow">
          <div>
            <div class="title">Игра окончена</div>
            <div class="sub">Ты врезался в трубу. Попробуй снова.</div>
            <div class="gradeBadge" id="gradeEl" aria-live="polite"></div>
          </div>
          <div style="text-align:right">
            <div class="bigNum" id="currentTop">0</div>
            <div class="sub" style="margin-top:0">Score</div>
          </div>
        </div>

        <div class="row">
          <div class="pill">
            <div class="k">Текущий счет</div>
            <div class="v" id="currentPill">0</div>
          </div>
          <div class="pill">
            <div class="k">Лучший счет</div>
            <div class="v" id="bestPill">0</div>
          </div>
        </div>

        <button id="restartBtn" type="button">Заново</button>

        <div class="togRow">
          <div class="toggleWrap">
            <div class="tLabel">Лицо</div>
          </div>
          <label class="faceSelectWrap" for="faceSelect2">
            <span class="srOnly">Выбрать лицо персонажа после смерти</span>
            <select id="faceSelect2" aria-label="Выбор лица после смерти">
              <option value="navalny">Навальный</option>
              <option value="lord">Лорд, бог, творец</option>
              <option value="rem">Рем Re:ZERO</option>
            </select>
          </label>
        </div>

        <div class="togRow">
          <div class="toggleWrap">
            <div class="tLabel">Звук</div>
          </div>
          <div id="soundSwitch2" class="switch on" role="switch" aria-checked="true" tabindex="0">
            <span class="srOnly">Переключить звук</span>
            <div class="knob"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
